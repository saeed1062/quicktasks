<!DOCTYPE html>
<html>
<head>
    {% load static %}
    <link href="{% static 'css/output.css' %}" rel="stylesheet">
</head>

<body class="bg-gray-100 opacity-0 transition-opacity duration-500">

<div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded shadow">

<h1 class="text-2xl font-bold mb-4">QuickTasks</h1>

<form action="/add/" method="POST" class="flex gap-2">
{% csrf_token %}
<input name="title" class="border p-2 flex-1 rounded" placeholder="New task">
<button class="bg-blue-500 text-white px-4 py-2 rounded transition cursor-pointer">Add</button>
</form>

<ul class="mt-5 space-y-2">

{% for task in tasks %}

<li class="task-item flex justify-between items-center border-b py-2 opacity-0 translate-y-2">

<span class="{% if task.completed %}line-through text-gray-400{% endif %}">
{{task.title}}
</span>

<div class="flex gap-2">

<a href="/toggle/{{task.id}}" class="text-green-600">✓</a>

<a href="{% url 'delete_task' task.id %}" class="delete-btn text-purple-950">
    ✕
</a>

</div>

</li>

{% endfor %}

</ul>

</div>
<script src="{% static 'js/app.js' %}"></script>
</body>
</html>
